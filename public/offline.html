<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayNow Offline</title>
    <meta name="theme-color" content="#39FF14" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #0a0f1c;
        color: #fff;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .panel {
        width: min(420px, 100%);
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        background: #151b2b;
        text-align: center;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }
      img {
        width: 84px;
        height: 84px;
        border-radius: 24px;
        object-fit: cover;
        margin-bottom: 20px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.1;
      }
      p {
        margin: 0 0 24px;
        color: #a8b3c7;
        line-height: 1.6;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 18px;
        padding: 14px 20px;
        background: #39FF14;
        color: #000;
        font-weight: 900;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <img src="/icons/icon-192.png" alt="PlayNow" />
      <h1>You are offline</h1>
      <p>PlayNow needs an internet connection to load live venues, slots, bookings and payments. Reconnect and try again.</p>
      <button type="button" onclick="window.location.reload()">Try Again</button>
    </main>
  </body>
</html>
